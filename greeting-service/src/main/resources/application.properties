spring.application.name=greeting-service
server.port=8080

greeting-service.greeting=Ola
greeting-service.default-name=Mundo

spring.profiles.active=es

management.endpoint.health.show-details=always
management.endpoint.env.show-values=always

spring.config.import=optional:configserver:http://localhost:8888/

#Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
#Ideal para ambiente containerizados
eureka.instance.prefer-ip-address=true
#Personalizar o id de cada instĂąncia
eureka.instance.instance-id=${spring.application.name}:${server.port}
#Indicar que o Service Registry deve validar a saĂșde do serviĂ§o atravĂ©s do actuator, e nĂŁo somente Heartbeat
# Opcional - Valor Default = TRUE
eureka.client.healthcheck.enabled=true

#ConfiguraĂ§ĂŁo mĂ­nima para atuaĂ§ĂŁo com o Service Registry de forma consciente
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
#ATENĂĂO: Cuidado a expor esses dados
#Exibir todas as informaĂ§Ă”es de saĂșde da aplicaĂ§ĂŁo
management.endpoint.health.show-details=always
#Exibir informaĂ§Ă”es no endpoint /actuator/info
management.info.env.enabled=true

#PersonalizaĂ§ĂŁo de ifnormaĂ§Ă”es do endpoint /actuator/info
info.app.name=${spring.application.name}
info.app.description=Serviço de testes de saudaçăo
info.app.autor=Bruno Galvagni
#PersonalizaĂ§ĂŁo de Metadatas para o Eureka Service Registry
eureka.instance.metadata-map.github.repo=Brunog21/ExtraG1Microservices

#Definir a ulizaĂ§ĂŁo das Probes Liveness e Readiness + exibiĂ§ĂŁo de de informaĂ§Ă”es de componentes diversos
# Opcional: PadrĂŁo jĂĄ Ă© TRUE
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true